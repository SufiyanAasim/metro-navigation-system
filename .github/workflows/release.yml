name: Build and Release Packaging

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet Packages
        run: msbuild "src\MetroApp\Metro App.csproj" /t:Restore /p:Configuration=Release /p:Platform=AnyCPU

      - name: Build Application (Release Mode)
        run: msbuild "src\MetroApp\Metro App.csproj" /p:Configuration=Release /p:Platform=AnyCPU

      - name: Package Binaries
        shell: pwsh
        run: |
          # Extract version from tag (e.g., v1.0.0 -> 1.0.0)
          $version = "${{ github.ref_name }}".TrimStart('v')
          ./scripts/package-release.ps1 -Version $version

      - name: Prepare Release Notes
        shell: pwsh
        run: |
          $notesPath = "docs/releases/${{ github.ref_name }}.md"
          if (Test-Path $notesPath) {
              Write-Host "Using release notes from $notesPath"
              Copy-Item $notesPath -Destination "release_notes_temp.md"
          } else {
              Write-Host "Release notes file not found, falling back to CHANGELOG.md"
              Copy-Item "CHANGELOG.md" -Destination "release_notes_temp.md"
          }

      - name: Create GitHub Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          files: MetroNavigationSystem-v*.zip
          body_path: release_notes_temp.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
