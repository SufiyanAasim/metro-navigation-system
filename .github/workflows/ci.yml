name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore
        run: msbuild "src\MetroApp\Metro App.csproj" /t:Restore /p:Configuration=Release /p:Platform=AnyCPU

      - name: Build
        run: msbuild "src\MetroApp\Metro App.csproj" /p:Configuration=Release /p:Platform=AnyCPU
