name: Frontend Validation

on:
  push:
    branches:
      - main
      - frontend
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build WinForms App
        run: msbuild "Metro App.csproj" /p:Configuration=Release /p:Platform=AnyCPU
